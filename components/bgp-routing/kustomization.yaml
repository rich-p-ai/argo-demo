apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ServerSideApply is required because namespace.yaml patches existing namespaces
# (linux-non-prod, windows-non-prod) that may already be managed by other ArgoCD apps.
# It merges labels without clobbering existing metadata.
commonAnnotations:
  argocd.argoproj.io/sync-options: ServerSideApply=true,SkipDryRunOnMissingResource=true

resources:
  - namespace.yaml
  - cudn-bgp-prod.yaml
  - route-advertisements.yaml
