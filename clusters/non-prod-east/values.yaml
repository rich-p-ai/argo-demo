applications:

  #---------------------------------------------------------------------------
  # BGP Direct Routing — VPC Route Server + FRR-K8s
  # Enables non-NATted L3 routing of Pod IPs (10.100.0.0/16) via AWS VPC Route Server.
  #
  # PREREQUISITES:
  #   AWS team provisions: VPC Route Server (ASN 65105), 3 RS Endpoints (1/AZ),
  #   3 MachinePools (bgp_router=true, r6i.metal, 1/AZ), RS Peers (bfd), src/dst check disabled.
  #   Fill in scripts/bgp/bgp-state.env (copy from bgp-state.env.template), then:
  #   bash scripts/bgp/01-patch-network-operator.sh
  #   bash scripts/bgp/02-apply-frr-config.sh
  #
  # sync-wave: 10  — after platform operators, before VM migrations
  # SkipDryRunOnMissingResource: FRRConfiguration + RouteAdvertisements CRDs
  #   only exist after Phase 4 (Network operator patch)
  #---------------------------------------------------------------------------
  bgp-routing:
    annotations:
      argocd.argoproj.io/compare-options: IgnoreExtraneous
      argocd.argoproj.io/sync-wave: "10"
      argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
    destination:
      namespace: openshift-frr-k8s
    source:
      path: clusters/non-prod-east/overlays/bgp-routing
      targetRevision: main

  kube-ops-view:
    annotations:
      argocd.argoproj.io/compare-options: IgnoreExtraneous
      argocd.argoproj.io/sync-wave: '15'
    destination:
      namespace: kube-ops-view
    source:
      path: clusters/non-prod-east/overlays/kube-ops-view

  mtv-configuration:
    annotations:
      argocd.argoproj.io/compare-options: IgnoreExtraneous
      argocd.argoproj.io/sync-wave: '10'
    destination:
      namespace: openshift-mtv
    source:
      path: clusters/non-prod-east/overlays/mtv-configuration
